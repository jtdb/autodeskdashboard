function Bar({ value, max, color, label, height = 24 }) {
  const pct = (value / max) * 100;
  return (
    <div style={{ marginBottom: 6 }}>
      {label && <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 2 }}>{label}</div>}
      <div style={{ background: COLORS.border, borderRadius: 4, height, overflow: "hidden", position: "relative" }}>
        <div
          style={{
            width: `${pct}%`,
            height: "100%",
            background: `linear-gradient(90deg, ${color}, ${color}88)`,
            borderRadius: 4,
            transition: "width 0.6s ease",
          }}
        />
      </div>
    </div>
  );
}

function MetricCard({ label, value, change, color = COLORS.accent }) {
  const isPositive = change && (change.startsWith("+") || change.includes("Subscription") || change.includes("CC") || change.includes("Target"));
  return (
    <div
      style={{
        background: COLORS.surface,
        border: `1px solid ${COLORS.border}`,
        borderRadius: 10,
        padding: "14px 16px",
        display: "flex",
        flexDirection: "column",
        gap: 4,
      }}
    >
      <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: COLORS.white, fontFamily: "'JetBrains Mono', monospace" }}>{value}</div>
      {change && (
        <div style={{ fontSize: 11, color: isPositive ? COLORS.green : COLORS.textDim, fontWeight: 500 }}>{change}</div>
      )}
    </div>
  );
}

}

function TierBadge({ tier }) {

    Growth: { bg: COLORS.greenDim, color: COLORS.green },
    Mature: { bg: COLORS.amberDim, color: COLORS.amber },
  };
  const s = map[tier] || map.Core;
  return (
    <span
      style={{
        fontSize: 10,
        fontWeight: 600,
        padding: "2px 8px",
        borderRadius: 20,
        background: s.bg,
        color: s.color,
        textTransform: "uppercase",
        letterSpacing: 0.5,
        whiteSpace: "nowrap",
      }}
    >
      {tier}
    </span>
  );
}

function PositionBadge({ position }) {
  let bg = COLORS.accentDim,
    color = COLORS.accent;
  if (position.includes("Leader") || position.includes("Dominant")) {
    bg = COLORS.greenDim;
    color = COLORS.green;
  } else if (position.includes("Strong") || position.includes("Fast")) {
    bg = COLORS.accentDim;
    color = COLORS.accent;
  } else if (position.includes("challenger") || position.includes("Growing") || position.includes("Cloud")) {
    bg = COLORS.purpleDim;
    color = COLORS.purple;
  }
  return (
    <span
      style={{
        fontSize: 10,
        fontWeight: 600,
        padding: "2px 8px",
        borderRadius: 20,
        background: bg,
        color,
        whiteSpace: "nowrap",
      }}
    >
      {position}
    </span>
  );
}
